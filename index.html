<!DOCTYPE html>
<html lang="hu">
<head>
<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dobos Tibor</title>

<style>
@keyframes fromTop {
  from { opacity:0; transform: translateY(-60px); }
  to { opacity:1; transform: translateY(0); }
}

@keyframes fromBottom {
  from { opacity:0; transform: translateY(60px); }
  to { opacity:1; transform: translateY(0); }
}

@keyframes zoomIn {
  from { transform: scale(1.2); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  overflow-x:hidden;
}

body {
  font-family: Arial, sans-serif;
  background:black;
  color:white;
  scroll-behavior:smooth;
}

/* HEADER */
header {
  background: transparent;
  padding:20px 0;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  transition: transform 0.4s ease;
}

.header-container {
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1400px;
  margin:0 auto;
  padding:0 20px;
  flex-wrap:wrap;
}

.logo img {
  height:40px;
  width:auto;
  display:block;
}

nav ul {
  list-style:none;
  display:flex;
  gap:16px;
}

nav a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  position:relative;
  padding-bottom:4px;
}

nav a::after {
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0;
  height:2px;
  background:rgb(118, 69, 255);
  transition:width 0.3s ease;
}

nav a:hover::after {
  width:100%;
}

/* HERO */
.hero {
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero video {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.4) 15%,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0) 60%,
    rgba(0,0,0,0.5) 85%,
    rgba(0,0,0,0.98) 100%
  );
  z-index:-1;
}

.hero-content {
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:20px;
  padding:0 20px;
}

.hero-content h1 {
  font-family: "Shadows Into Light", cursive;
  font-size:clamp(28px, 6vw, 64px);
  font-weight:300;
  letter-spacing:2px;
  text-align:center;
  animation: zoomIn 1.5s ease-out forwards;
}

.t1 { animation: fromTop 1s ease-out forwards; }
.t2 { animation: fromBottom 1s ease-out forwards; margin-left:10px; }

/* BUTTONS */
.button-container {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.button1, .button2 {
  padding:12px 28px;
  border-radius:30px;
  border:1px solid rgb(118,69,255);
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.button1 {
  animation: fromBottom 1s ease-out forwards;
}

.button2 {
  background:rgba(118,69,255,0.5);
  animation: fromTop 1s ease-out forwards;
}

.button1:hover {
  background:rgb(118,69,255);
  color:black;
}

.button2:hover {
  background:black;
}

section {
